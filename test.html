<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Депонирование</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    button {
      width: 90%;
      max-width: 400px;
      padding: 20px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 20px;
      background: #0f172a;
      color: white;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

<button id="payBtn">Депонировать</button>

<script>
const amount = '15000.00';

async function pay() {
  if (!window.PaymentRequest) {
    alert('Safari не поддерживает PaymentRequest. Нужно открывать через HTTPS и Safari');
    return;
  }

  try {
    const request = new PaymentRequest(
      [
        { supportedMethods: 'https://apple.com/apple-pay' }
      ],
      {
        total: {
          label: 'Депонирование на счёт эксперта',
          amount: { currency: 'RUB', value: amount }
        }
      }
    );

    const response = await request.show();
    await response.complete('success');

  } catch (e) {
    console.log(e);
    alert('Не удалось открыть окно оплаты. Проверь HTTPS и Safari');
  }
}

document.getElementById('payBtn').addEventListener('click', pay);
</script>

</body>
</html>
