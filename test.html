<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тестовая страница оплаты</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 720px;
      margin: 60px auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      line-height: 1.2;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin: 14px 0;
    }

    .note {
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      padding: 14px 16px;
      border-radius: 12px;
      margin: 22px 0;
      font-size: 16px;
    }

    .meta {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
    }

    .btn {
      display: inline-block;
      background: #6d4aff;
      color: #fff;
      text-decoration: none;
      padding: 16px 28px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn:hover {
      opacity: 0.92;
    }

    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Поддержать проект</h1>

      <p>
        Ниже размещена тестовая кнопка.
      </p>

      <a
        class="btn"
        href="https://merch.tochka.com/order/?uuid=c475b86f-eb5b-4ed4-830a-54460ccdacb7"
        target="_blank"
        rel="noopener noreferrer"
      >
        нажать
      </a>

      <div class="small">
       
      </div>
    </div>
  </div>
</body>
</html>
